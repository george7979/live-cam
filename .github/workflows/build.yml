name: Build Windows .exe

on:
  push:
    branches: [dev]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - ".github/workflows/**"
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and Tauri CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: cargo tauri build --bundles nsis

      - name: Upload portable .exe
        uses: actions/upload-artifact@v4
        with:
          name: live-cam-windows
          path: src-tauri/target/release/live-cam.exe
          retention-days: 30

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: live-cam-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  dev-prerelease:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    permissions:
      contents: write

    steps:
      - name: Download portable .exe
        uses: actions/download-artifact@v4
        with:
          name: live-cam-windows
          path: portable

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: live-cam-installer
          path: installer

      - name: Update dev pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: "Development Build"
          body: |
            Latest development build from `dev` branch.
            **This is a pre-release** — may contain untested changes.

            Updated automatically on every push to `dev`.
          prerelease: true
          make_latest: false
          files: |
            portable/live-cam.exe
            installer/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download portable .exe
        uses: actions/download-artifact@v4
        with:
          name: live-cam-windows
          path: portable

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: live-cam-installer
          path: installer

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            portable/live-cam.exe
            installer/*.exe
          generate_release_notes: true
