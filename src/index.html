<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Cam</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="toolbar">
    <label for="cameraSelect">Camera:</label>
    <select id="cameraSelect">
      <option value="">-- Discover cameras --</option>
    </select>
    <button id="discoverBtn" title="Discover cameras">&#x21bb;</button>
    <span class="resolution" id="resolution"></span>
    <button id="settingsBtn" title="Settings">&#x2699;</button>
  </div>

  <div class="video-container" id="videoContainer">
    <video id="video" autoplay playsinline></video>
    <div class="no-camera" id="noCameraMsg">
      <p>Choose a camera from the list above</p>
    </div>
  </div>

  <div class="context-menu" id="contextMenu">
    <div class="menu-item" id="menuFullscreen">Fullscreen</div>
    <div class="menu-item" id="menuBorderless">Hide toolbar</div>
    <div class="menu-divider"></div>
    <div class="menu-item menu-info" id="menuResolution"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
