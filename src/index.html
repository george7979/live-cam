<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Cam</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="toolbar">
    <label for="cameraSelect">Kamera:</label>
    <select id="cameraSelect">
      <option value="">-- Wykrywanie kamer... --</option>
    </select>
    <span class="resolution" id="resolution"></span>
  </div>

  <div class="video-container" id="videoContainer">
    <video id="video" autoplay playsinline></video>
    <div class="no-camera" id="noCameraMsg">
      <p>Wybierz kamerę z listy powyżej</p>
    </div>
  </div>

  <div class="context-menu" id="contextMenu">
    <div class="menu-section" id="menuCameras"></div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="menuFullscreen">Pełny ekran</div>
    <div class="menu-divider"></div>
    <div class="menu-item menu-info" id="menuResolution"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
